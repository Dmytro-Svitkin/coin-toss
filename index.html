<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Toss</title>

    <link rel="stylesheet" href="./css.css">
    <script src="./js.js"></script>
</head>
<body onload="Start()">
    <ul id="coin">
        <li><img id="bottom" src="./images/bottom.svg" alt="bottom" max-width="600" z-index="2"></li>
        <li><img id="edge" src="./images/edge.svg" alt="edge" max-width="600" z-index="3"></li>
        <li><img id="tails" src="./images/tails.svg" alt="tails" max-width="600" z-index="4" style="display:none;"></li>
        <li><img id="heads" src="./images/heads.svg" alt="heads" max-width="600" z-index="5"></li>
        <li><div id="click-area" style="width: 600px; height: 600px; display: block; cursor: pointer; border-radius: 50%;" z-index="6" onclick="Toss()"></div></li>
    </ul>
</body>
</html>
