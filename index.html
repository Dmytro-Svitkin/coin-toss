<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Toss</title>

    <link rel="stylesheet" href="./css.css">
    <script src="./js.js"></script>
</head>
<body onload="Start()">
    <ul id="coin">
        <li z-index="2"><img id="bottom" src="./images/bottom.svg" alt="bottom" max-width="600" z-index="2"></li>
        <li z-index="3"><img id="edge" src="./images/edge.svg" alt="edge" max-width="600" z-index="3"></li>
        <li z-index="4"><img id="tails" src="./images/tails.svg" alt="tails" max-width="600" z-index="4"></li>
        <li z-index="5"><img id="heads" src="./images/heads.svg" alt="heads" max-width="600" z-index="5"></li>
        <li z-index="6"><img id="click-area" src="./images/click-area.svg" alt="Click To Toss" max-width="600" z-index="6" onclick="Toss()" style="display:block; border-radius: 50%;"></li>
    </ul>
</body>
</html>
